<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 Analyzer — Phân tích tiếng Nhật</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5ede0;
    --aged: #e8d9c0;
    --red: #c0392b;
    --gold: #b8860b;
    --brushstroke: #2c1810;
    --muted: #7a6a5a;
    --highlight: #fff3cd;
    --border: #c9ad8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(184,134,11,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(192,57,43,0.06) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 20px;
  }

  header {
    text-align: center;
    padding: 36px 0 24px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 32px;
    position: relative;
  }
  header::after {
    content: '⛩';
    position: absolute;
    bottom: -18px; left: 50%;
    transform: translateX(-50%);
    background: var(--paper);
    padding: 0 12px;
    font-size: 22px;
  }

  .title-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    color: var(--brushstroke);
    letter-spacing: 0.12em;
    line-height: 1;
  }
  .title-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .input-zone {
    max-width: 760px;
    margin: 0 auto 28px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    box-shadow: 4px 4px 0 var(--aged), 0 2px 20px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .input-label {
    background: var(--brushstroke);
    color: var(--paper);
    padding: 8px 16px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .input-label span { font-family: 'Noto Serif JP', serif; font-size: 16px; }

  textarea {
    width: 100%;
    padding: 18px;
    border: none;
    outline: none;
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(18px, 3vw, 24px);
    background: transparent;
    color: var(--ink);
    resize: none;
    min-height: 90px;
    line-height: 1.6;
  }
  textarea::placeholder { color: #c9b89a; font-family: 'Noto Serif JP', serif; }

  .btn-row {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 1px solid var(--aged);
    background: #faf5ee;
    flex-wrap: wrap;
  }
  .btn-analyze {
    background: var(--red);
    color: white;
    border: none;
    padding: 10px 28px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    box-shadow: 3px 3px 0 #8e1a12;
  }
  .btn-analyze:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #8e1a12; }
  .btn-analyze:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 #8e1a12; }
  .btn-analyze:disabled { background: #bbb; box-shadow: 2px 2px 0 #888; cursor: not-allowed; transform: none; }

  .examples-label { font-size: 11px; color: var(--muted); margin-left: auto; }
  .ex-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 5px 10px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .ex-btn:hover { background: var(--aged); color: var(--ink); }

  /* Result */
  #result {
    max-width: 760px;
    margin: 0 auto;
    display: none;
  }

  .loading {
    text-align: center;
    padding: 60px 0;
    display: none;
  }
  .loading-scroll {
    font-size: 48px;
    animation: rotate 2s linear infinite;
    display: block;
    margin-bottom: 16px;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 14px; letter-spacing: 0.1em; }

  .section {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    box-shadow: 3px 3px 0 var(--aged);
    margin-bottom: 20px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sec-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    background: linear-gradient(135deg, var(--brushstroke), #3d2010);
    color: var(--paper);
  }
  .sec-icon { font-size: 20px; }
  .sec-title { font-weight: 700; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; }
  .sec-title-jp { font-family: 'Noto Serif JP', serif; font-size: 16px; margin-left: auto; opacity: 0.7; }

  .sec-body { padding: 20px 22px; }

  /* Sentence breakdown */
  .sentence-full {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(22px, 4vw, 32px);
    text-align: center;
    padding: 20px;
    background: var(--brushstroke);
    color: var(--paper);
    letter-spacing: 0.1em;
    line-height: 1.8;
  }
  .sentence-reading {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    padding: 10px;
    letter-spacing: 0.15em;
    background: #faf5ee;
    border-bottom: 1px solid var(--aged);
  }
  .sentence-meaning {
    text-align: center;
    font-size: 15px;
    padding: 14px 20px;
    color: var(--ink);
    font-style: italic;
    background: var(--highlight);
    border-top: 1px solid #f0d070;
  }

  /* Grammar table */
  .gram-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .gram-table th {
    background: var(--aged);
    padding: 9px 14px;
    text-align: left;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .gram-table td {
    padding: 11px 14px;
    border-bottom: 1px solid #f0e8d8;
    vertical-align: top;
    line-height: 1.5;
  }
  .gram-table tr:last-child td { border-bottom: none; }
  .gram-table tr:hover td { background: #faf5ee; }

  .part-jp { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 700; color: var(--red); }
  .part-role {
    display: inline-block;
    background: var(--brushstroke);
    color: var(--paper);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .part-transform {
    display: inline-block;
    background: #fff3cd;
    border: 1px solid #f0c030;
    color: #7a5c00;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    margin-left: 4px;
  }

  /* Kanji cards */
  .kanji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .kanji-card {
    border: 1.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #fffdf8;
  }
  .kanji-card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #2c1810, #4a2818);
    color: var(--paper);
  }
  .kanji-char {
    font-family: 'Noto Serif JP', serif;
    font-size: 48px;
    line-height: 1;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }
  .kanji-readings { font-size: 12px; opacity: 0.8; line-height: 1.8; }
  .kanji-readings strong { opacity: 1; font-size: 14px; }
  .kanji-body { padding: 14px 16px; }
  .kanji-origin {
    font-size: 13px;
    line-height: 1.7;
    color: #4a3020;
    background: linear-gradient(135deg, #fff8ee, #fff3e0);
    border-left: 3px solid var(--gold);
    padding: 10px 14px;
    border-radius: 0 4px 4px 0;
    margin-bottom: 12px;
    font-style: italic;
  }
  .kanji-origin-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--gold); font-style: normal; font-weight: 700; display: block; margin-bottom: 4px; }
  .kanji-meaning { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .kanji-example { font-size: 12px; margin-top: 8px; color: var(--ink); }
  .kanji-example strong { font-family: 'Noto Serif JP', serif; color: var(--red); }

  /* Vocab cards */
  .vocab-item {
    border-left: 3px solid var(--red);
    padding: 14px 16px;
    margin-bottom: 14px;
    background: #fffdf8;
    border-radius: 0 4px 4px 0;
  }
  .vocab-item:last-child { margin-bottom: 0; }
  .vocab-word { font-family: 'Noto Serif JP', serif; font-size: 22px; color: var(--ink); font-weight: 700; }
  .vocab-read { font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.1em; }
  .vocab-def { font-size: 14px; color: var(--ink); margin-bottom: 8px; line-height: 1.6; }
  .vocab-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.1em;
    font-weight: 700;
    text-transform: uppercase;
  }
  .tag-n4 { background: #e8f4e8; color: #2d6a2d; border: 1px solid #a8d8a8; }
  .tag-n3 { background: #e8eef8; color: #2d4a8a; border: 1px solid #a8c0e8; }
  .tag-n5 { background: #f8e8e8; color: #8a2d2d; border: 1px solid #e8a8a8; }
  .tag-type { background: #f0ece4; color: #6a5a3a; border: 1px solid #d0c0a0; }
  .vocab-example {
    font-size: 13px;
    background: var(--highlight);
    border: 1px solid #f0d070;
    padding: 10px 14px;
    border-radius: 4px;
    line-height: 1.8;
  }
  .vocab-example .jp { font-family: 'Noto Serif JP', serif; font-size: 15px; color: var(--brushstroke); display: block; }
  .vocab-example .read { font-size: 11px; color: var(--muted); display: block; }
  .vocab-example .vi { font-style: italic; color: #5a4a2a; display: block; font-size: 13px; }

  /* Grammar patterns */
  .pattern-item {
    background: linear-gradient(135deg, #1a1008, #2c1810);
    color: var(--paper);
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 14px;
  }
  .pattern-item:last-child { margin-bottom: 0; }
  .pattern-name { font-size: 18px; font-family: 'Noto Serif JP', serif; color: #ffd080; margin-bottom: 4px; }
  .pattern-level { font-size: 10px; background: #ffd080; color: #2c1810; padding: 2px 8px; border-radius: 2px; font-weight: 700; letter-spacing: 0.1em; }
  .pattern-meaning { font-size: 13px; margin: 8px 0; opacity: 0.9; line-height: 1.6; }
  .pattern-form { font-size: 12px; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 4px; font-family: 'Noto Serif JP', serif; margin-bottom: 8px; }
  .pattern-ex { font-size: 12px; opacity: 0.8; line-height: 1.7; }
  .pattern-ex .pjp { font-family: 'Noto Serif JP', serif; font-size: 14px; color: #ffd080; display: block; }

  /* Nuance box */
  .nuance-box {
    background: linear-gradient(135deg, #fff8ee, #fff3e0);
    border: 1.5px solid var(--gold);
    border-radius: 4px;
    padding: 20px;
    line-height: 1.8;
    font-size: 14px;
    color: #3a2808;
  }
  .nuance-box p { margin-bottom: 12px; }
  .nuance-box p:last-child { margin-bottom: 0; }
  .nuance-highlight { background: rgba(255,200,50,0.3); padding: 1px 4px; border-radius: 2px; }

  footer {
    text-align: center;
    padding: 32px 0 16px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    margin-top: 40px;
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Streaming cursor */
  .cursor { display: inline-block; width: 2px; height: 1em; background: var(--red); animation: blink 0.7s infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }

  .error-box {
    background: #fff0ee;
    border: 1.5px solid #e8a0a0;
    border-radius: 4px;
    padding: 16px 20px;
    color: #8a2020;
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
  }

  @media (max-width: 600px) {
    .kanji-grid { grid-template-columns: 1fr; }
    .btn-row { gap: 8px; }
    .examples-label { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="title-jp">日本語 解析</div>
  <div class="title-sub">Công cụ phân tích tiếng Nhật chuyên sâu cho người mới</div>
</header>

<div class="input-zone">
  <div class="input-label">
    <span>文</span> Nhập câu tiếng Nhật
  </div>
  <textarea id="inputSentence" placeholder="例：毎日日本語を勉強しています。" rows="3"></textarea>
  <div class="btn-row">
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">⚡ Phân tích ngay</button>
    <span class="examples-label">Thử ngay:</span>
    <button class="ex-btn" onclick="setExample('毎日日本語を勉強しています。')">毎日勉強…</button>
    <button class="ex-btn" onclick="setExample('昨日、友達と映画を見に行きました。')">映画を見に…</button>
    <button class="ex-btn" onclick="setExample('この本は難しくて、全然わかりません。')">難しくて…</button>
    <button class="ex-btn" onclick="setExample('もし時間があれば、一緒に行きませんか。')">もし〜たら…</button>
  </div>
</div>

<div class="error-box" id="errorBox"></div>

<div class="loading" id="loading">
  <span class="loading-scroll">📜</span>
  <p>Đang triệu hồi học giả... vui lòng đợi 1–2 phút ☕</p>
</div>

<div id="result"></div>

<footer>
  日本語解析 • Powered by Claude AI • Dành cho người học tiếng Nhật N5–N4
</footer>

<script>
function setExample(text) {
  document.getElementById('inputSentence').value = text;
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = '⚠️ ' + msg;
  b.style.display = 'block';
}
function hideError() { document.getElementById('errorBox').style.display = 'none'; }

async function analyze() {
  const sentence = document.getElementById('inputSentence').value.trim();
  if (!sentence) { showError('Hãy nhập một câu tiếng Nhật!'); return; }
  hideError();

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Đang phân tích...';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('result').innerHTML = '';

  const systemPrompt = `Bạn là giáo sư ngôn ngữ Nhật Bản chuyên phân tích câu cho người mới học (N5-N4).
Khi nhận một câu tiếng Nhật, hãy phân tích TOÀN DIỆN và trả về JSON hợp lệ DUY NHẤT, KHÔNG có markdown, KHÔNG có backtick, KHÔNG có text ngoài JSON.

Schema JSON cần trả về:
{
  "sentence": "câu gốc",
  "reading": "furigana hoặc romaji",
  "meaning_vi": "nghĩa tiếng Việt",
  "breakdown": [
    {
      "part": "từ/phần",
      "reading": "cách đọc",
      "role": "chủ ngữ/vị ngữ/tân ngữ/trợ từ/...",
      "meaning": "nghĩa",
      "transform": "biến đổi nếu có (vd: て形, た形, ます形...)",
      "note": "ghi chú ngắn"
    }
  ],
  "kanji": [
    {
      "char": "kanji",
      "on": "âm on",
      "kun": "âm kun",
      "meaning": "nghĩa",
      "origin_story": "câu chuyện nguồn gốc CỰC KỲ sinh động và bạo lực/ấn tượng theo phong cách Giáp Cốt Văn / Kim Văn hoặc hư cấu hợp lý, ngắn 2-3 câu, phải gây ấn tượng mạnh để dễ nhớ, dùng hình ảnh chiến tranh, săn bắn, lửa, máu nếu phù hợp",
      "example_word": "từ ví dụ dùng kanji này",
      "example_read": "cách đọc từ ví dụ",
      "example_meaning": "nghĩa từ ví dụ"
    }
  ],
  "vocabulary": [
    {
      "word": "từ vựng",
      "reading": "cách đọc",
      "type": "danh từ/động từ/tính từ/...",
      "jlpt": "N5/N4/N3",
      "meaning": "nghĩa đầy đủ",
      "nuance": "sắc thái hoặc cách dùng đặc biệt",
      "example_jp": "câu ví dụ N4 có cấu trúc bay nhảy",
      "example_read": "cách đọc câu ví dụ",
      "example_vi": "dịch câu ví dụ"
    }
  ],
  "grammar_patterns": [
    {
      "pattern": "mẫu ngữ pháp",
      "jlpt": "N5/N4/N3",
      "meaning": "ý nghĩa / cách dùng",
      "form": "cách chia / cấu trúc",
      "example_jp": "câu ví dụ",
      "example_read": "cách đọc",
      "example_vi": "dịch"
    }
  ],
  "nuance": "phân tích hàm ý sâu: tại sao người nói dùng cách nói này, bối cảnh xã hội, sắc thái lịch sự/thân mật, điều ẩn chứa phía sau câu nói (2-4 đoạn văn tiếng Việt)"
}

Quan trọng:
- origin_story của kanji PHẢI độc đáo, gắt, dễ nhớ. Ví dụ cho 火: "Người Shang nhìn ngọn lửa thiêu rừng, vẽ hình ba lưỡi lửa bùng lên — đó là 火. Lửa không hỏi han, lửa chỉ thiêu."
- Chỉ phân tích kanji THỰC SỰ có trong câu
- grammar_patterns: phân tích TẤT CẢ mẫu ngữ pháp quan trọng trong câu
- vocabulary: phân tích các từ nội dung quan trọng (không cần phân tích trợ từ nhỏ như は、が、を)
- Trả về JSON thuần túy, không có gì khác`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        system: systemPrompt,
        messages: [{ role: "user", content: `Phân tích câu này: ${sentence}` }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error');

    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderResult(parsed);

  } catch (err) {
    showError('Có lỗi xảy ra: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ Phân tích ngay';
    document.getElementById('loading').style.display = 'none';
  }
}

function renderResult(d) {
  const result = document.getElementById('result');
  result.style.display = 'block';

  let html = '';

  // Overview
  html += `<div class="section" style="animation-delay:0s">
    <div class="sentence-full">${d.sentence}</div>
    <div class="sentence-reading">📖 ${d.reading}</div>
    <div class="sentence-meaning">🇻🇳 ${d.meaning_vi}</div>
  </div>`;

  // Grammar breakdown
  if (d.breakdown?.length) {
    html += `<div class="section" style="animation-delay:0.05s">
      <div class="sec-header">
        <span class="sec-icon">🔬</span>
        <span class="sec-title">Phân tích cú pháp</span>
        <span class="sec-title-jp">文法解析</span>
      </div>
      <div class="sec-body" style="padding:0">
        <table class="gram-table">
          <thead><tr>
            <th>Thành phần</th><th>Vai trò</th><th>Nghĩa</th><th>Biến thể</th><th>Ghi chú</th>
          </tr></thead><tbody>`;
    for (const p of d.breakdown) {
      html += `<tr>
        <td><div class="part-jp">${p.part}</div><div style="font-size:11px;color:#999">${p.reading || ''}</div></td>
        <td><span class="part-role">${p.role}</span></td>
        <td style="font-size:13px">${p.meaning}</td>
        <td>${p.transform ? `<span class="part-transform">${p.transform}</span>` : '<span style="color:#ccc">—</span>'}</td>
        <td style="font-size:12px;color:#7a6a5a">${p.note || ''}</td>
      </tr>`;
    }
    html += `</tbody></table></div></div>`;
  }

  // Kanji
  if (d.kanji?.length) {
    html += `<div class="section" style="animation-delay:0.1s">
      <div class="sec-header">
        <span class="sec-icon">🗡️</span>
        <span class="sec-title">Hán tự — Nguồn gốc</span>
        <span class="sec-title-jp">漢字の起源</span>
      </div>
      <div class="sec-body"><div class="kanji-grid">`;
    for (const k of d.kanji) {
      html += `<div class="kanji-card">
        <div class="kanji-card-head">
          <div class="kanji-char">${k.char}</div>
          <div class="kanji-readings">
            <strong>${k.meaning}</strong><br>
            On: ${k.on || '—'}<br>
            Kun: ${k.kun || '—'}
          </div>
        </div>
        <div class="kanji-body">
          <div class="kanji-origin">
            <span class="kanji-origin-title">📜 Giáp Cốt / Hư Cấu Lịch Sử</span>
            ${k.origin_story}
          </div>
          <div class="kanji-example">Ví dụ: <strong>${k.example_word}</strong> (${k.example_read}) — ${k.example_meaning}</div>
        </div>
      </div>`;
    }
    html += `</div></div></div>`;
  }

  // Vocabulary
  if (d.vocabulary?.length) {
    html += `<div class="section" style="animation-delay:0.15s">
      <div class="sec-header">
        <span class="sec-icon">📚</span>
        <span class="sec-title">Từ vựng chi tiết</span>
        <span class="sec-title-jp">語彙</span>
      </div>
      <div class="sec-body">`;
    for (const v of d.vocabulary) {
      const lvlClass = v.jlpt === 'N5' ? 'tag-n5' : v.jlpt === 'N3' ? 'tag-n3' : 'tag-n4';
      html += `<div class="vocab-item">
        <div class="vocab-word">${v.word}</div>
        <div class="vocab-read">${v.reading}</div>
        <div class="vocab-tags">
          <span class="tag ${lvlClass}">${v.jlpt}</span>
          <span class="tag tag-type">${v.type}</span>
        </div>
        <div class="vocab-def">${v.meaning}</div>
        ${v.nuance ? `<div style="font-size:12px;color:#7a5a2a;margin-bottom:10px;font-style:italic">💡 ${v.nuance}</div>` : ''}
        <div class="vocab-example">
          <span class="jp">${v.example_jp}</span>
          <span class="read">${v.example_read}</span>
          <span class="vi">→ ${v.example_vi}</span>
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }

  // Grammar patterns
  if (d.grammar_patterns?.length) {
    html += `<div class="section" style="animation-delay:0.2s">
      <div class="sec-header">
        <span class="sec-icon">⚙️</span>
        <span class="sec-title">Mẫu ngữ pháp</span>
        <span class="sec-title-jp">文法パターン</span>
      </div>
      <div class="sec-body">`;
    for (const g of d.grammar_patterns) {
      html += `<div class="pattern-item">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div class="pattern-name">${g.pattern}</div>
          <span class="pattern-level">${g.jlpt}</span>
        </div>
        <div class="pattern-meaning">${g.meaning}</div>
        <div class="pattern-form">${g.form}</div>
        <div class="pattern-ex">
          <span class="pjp">${g.example_jp}</span>
          <span style="opacity:0.7;font-size:11px">${g.example_read}</span><br>
          <span>→ ${g.example_vi}</span>
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }

  // Nuance
  if (d.nuance) {
    const paras = d.nuance.split('\n').filter(p => p.trim());
    html += `<div class="section" style="animation-delay:0.25s">
      <div class="sec-header">
        <span class="sec-icon">🎭</span>
        <span class="sec-title">Hàm ý & Ngữ cảnh</span>
        <span class="sec-title-jp">含意・文脈</span>
      </div>
      <div class="sec-body">
        <div class="nuance-box">
          ${paras.map(p => `<p>${p}</p>`).join('')}
        </div>
      </div>
    </div>`;
  }

  result.innerHTML = html;
  result.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inputSentence').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) analyze();
  });
});
</script>
</body>
</html>
